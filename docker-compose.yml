services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-promptdb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-promptdb-dev-secret}
      POSTGRES_DB: ${POSTGRES_DB:-promptdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} && PGPASSWORD=$${POSTGRES_PASSWORD} psql -U $${POSTGRES_USER} -d $${POSTGRES_DB} -c 'SELECT 1' >/dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-promptdb}:${POSTGRES_PASSWORD:-promptdb-dev-secret}@postgres:5432/${POSTGRES_DB:-promptdb}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me-use-openssl-rand-hex-32}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,https://localhost,http://localhost:5173}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-true}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 120s
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    environment:
      API_UPSTREAM: ${API_UPSTREAM:-http://backend:8000}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:8080"
      - "${HTTPS_PORT:-443}:8443"
    volumes:
      - ${SSL_CERT_DIR:-./certs}:/etc/nginx/ssl:ro

volumes:
  postgres_data:
