apiVersion: apps/v1
kind: Deployment
metadata:
  name: prompt-db-backend
  namespace: prompt-db
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prompt-db-backend
  template:
    metadata:
      labels:
        app: prompt-db-backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: backend
          image: ghcr.io/erlkoenig91/prompt-db-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: prompt-db-config
            - secretRef:
                name: prompt-db-secrets
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: prompt-db-backend
  namespace: prompt-db
spec:
  selector:
    app: prompt-db-backend
  ports:
    - port: 8000
      targetPort: 8000
