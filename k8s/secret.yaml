# Beispiel – in Produktion durch External Secrets / Sealed Secrets ersetzen
apiVersion: v1
kind: Secret
metadata:
  name: prompt-db-secrets
  namespace: prompt-db
type: Opaque
stringData:
  POSTGRES_PASSWORD: change-me
  SECRET_KEY: change-me-use-openssl-rand-hex-32
  DATABASE_URL: postgresql+asyncpg://promptdb:change-me@postgres:5432/promptdb
