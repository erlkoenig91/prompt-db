services:
  backend:
    image: ${IMAGE_REGISTRY:-ghcr.io/erlkoenig91}/prompt-db-backend:${TAG:-latest}
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ENVIRONMENT: production
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-true}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 120s

  frontend:
    image: ${IMAGE_REGISTRY:-ghcr.io/erlkoenig91}/prompt-db-frontend:${TAG:-latest}
    environment:
      API_UPSTREAM: ${API_UPSTREAM:-http://backend:8000}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:8080"
      - "${HTTPS_PORT:-443}:8443"
    volumes:
      - ${SSL_CERT_DIR:-./certs}:/etc/nginx/ssl:ro
